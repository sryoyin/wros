<!DOCTYPE html>
<html lang="es">
    <head>
        <link rel="stylesheet" href="style.css">
        <link rel="icon" href="img/icon.png">
        <meta charset="UTF-8">
        <title>White Room - Main</title>
        <link rel="manifest" href="manifest.json">
        <meta name="theme-color" content="#0a0a49">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script>
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js')
                .then(() => console.log("White Room PWA Ready"));
            }
        </script>
    </head>
    <body>
        <!-- BARRA DE NAVEGACIÓN -->
        <nav>
            <section>
                <button onclick="location.href='profile'" style="padding: 15px 20px;"><img id="accimg" src="img/student.png" width="50px"></button>
                <span>WHITE ROOM</span>
            </section>
            <section style="gap: 0;">
                <button onclick="location.href='main'"><img src="img/main.png" width="40px">Main</button>
                <button onclick="location.href='schedule'"><img src="img/schedule.png" width="40px">Schedule</button>
                <button onclick="location.href='oaa'"><img src="img/oaa.png" width="40px">OAA</button>
            </section>
        </nav>
        <!-- LOADER -->
        <div id="global-loader">
            <div class="spinner"></div>
        </div>
        <!-- PÁGINA -->
        <div class="⬜">
            <div id="cal-gadget" class = "🧱" style="align-items: flex-start;">
                <h1>CALENDAR</h1>
                <section class="⚙️">
                    <div class="🗓️">
                        <p>DAYNAME - 00/00/0000</p>
                        <div class="⏰">
                            <button>
                                <p>ACTIVITY</p>
                                <section>
                                    <img src="img/clock.png" width="22px">
                                    <p style="font-size: 15px;">00:00 - 00:00</p>
                                </section>
                            </button>
                            <button>
                                <p>ACTIVITY</p>
                                <section>
                                    <img src="img/clock.png" width="22px">
                                    <p style="font-size: 15px;">00:00 - 00:00</p>
                                </section>
                            </button>
                        </div>
                    </div>
                </section>
            </div>
            <div id="prog-gadget" class = "🧱" style="align-items: flex-end;">
                <h1>PROGRESS</h1>
                <section class="⚙️">
                    <div class="🗓️">
                        <section>
                            <p>DAILY PROGRESS</p>
                            <p>0%</p>
                        </section>
                        <div class="📊">
                            <div id="dailybar"></div>
                        </div>
                    </div>
                    <div class="🗓️">
                        <section>
                            <p>WEEKLY PROGRESS</p>
                            <p>0%</p>
                        </section>
                        <div class="📊">
                            <div id="weeklybar"></div>
                        </div>
                    </div>
                </section>
                <br>
                <br>
                <h1>NOTES</h1>
                <section class="⚙️">
                    <div class="🗓️">
                        <textarea maxlength="2000" class="🗒️" placeholder="Write here..." id="note-gadget-container"></textarea>
                        <button id="note-gadget-updater">Save current notes</button>
                    </div>
                </section>
            </div>
        </div>
        <!-- SCRIPTS -->
        <script type="module" src="scripts/gadgetlogic.js"></script>
        <script type="module" src="scripts/mainlogic.js"></script>
    </body>
</html>
