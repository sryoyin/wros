<!DOCTYPE html>
<html lang="es">
    <head>
        <link rel="stylesheet" href="style.css">

    <body>
        <!-- BARRA DE NAVEGACIÓN -->
        <nav>
            <section>
                <button style="padding: 15px 20px;"><img src="img/student.png" width="50px"></button>

            <section style="gap: 0;">

        <!-- PÁGINA -->
        <form>
            <h1>Achive your potential now</h1>

                <label for="username">User:</label>
