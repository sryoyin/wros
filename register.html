<!DOCTYPE html>
<html lang="es">
    <head>
        <link rel="stylesheet" href="style.css">
        <link rel="icon" href="img/student.png">
        <meta charset="UTF-8">
        <title>White Room - Register</title>
    </head>
    <body>
        <!-- BARRA DE NAVEGACIÓN -->
        <nav>
            <section>
                <button style="padding: 15px 20px;"><img id = accimg src="img/student.png" width="50px"></button>
                <span>WHITE ROOM</span>
            </section>
            <section style="gap: 0;">
                <button onclick="location.href='main'"><img src="img/student.png" width="40px">Main</button>
                <button onclick="location.href='schedule'"><img src="img/student.png" width="40px">Schedule</button>
                <button onclick="location.href='oaa'"><img src="img/student.png" width="40px">OAA</button>
            </section>
        </nav>
        <!-- PÁGINA -->
        <form id="register-form">
            <h1>Achive your potential now</h1>
            <h2>Create an account today:</h2>
            <section>
                <label for="username">User:</label>
                <input type="text" id="username" required>
            </section>
            <section>
                <label for="pass">Password:</label>
                <input type="password" id="pass" required>
            </section>
            <section>
                <button type="submit">Create account</button>
                <button type="button" id="google-btn"><img src="img/google-icon.png" width="20px">Register with Google</button>
            </section>
            <button onclick="location.href='login';">Already have an account?</button>
        </form>
        <!-- SCRIPTS -->
        <script type="module" src="scripts/auth.js"></script>
        <script type="module" src="scripts/mainlogic.js"></script>
    </body>
</html>
