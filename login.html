<!DOCTYPE html>
<html lang="es">
    <head>
        <link rel="stylesheet" href="style.css">
        <link rel="icon" href="img/student.png">
        <meta charset="UTF-8">
        <title>White Room - Login</title>
    </head>
    <body>
        <!-- BARRA DE NAVEGACIÓN -->
        <nav>
            <section>
                <button style="padding: 15px 20px;"><img id = accimg src="img/student.png" width="50px"></button>
                <span>WHITE ROOM</span>
            </section>
            <section style="gap: 0;">
                <button><img src="img/student.png" width="40px">Main</button>
                <button><img src="img/student.png" width="40px">Schedule</button>
                <button><img src="img/student.png" width="40px">OAA</button>
            </section>
        </nav>
        <!-- PÁGINA -->
        <form id="login-form">
            <h1>Login</h1>
            <section>
                <label for="login-user">User:</label>
                <input type="text" id="login-user" required>
            </section>
            <section>
                <label for="login-pass">Password:</label>
                <input type="password" id="login-pass" required>
            </section>
            <section>
                <button type="submit">Login</button>
                <button type="button" id="google-btn"><img src="img/google-icon.png" width="20px">Login with Google</button>
            </section>
            <button onclick="window.location.href='register.html';">Dont have an account? Start today</button>
        </form>
        <!-- SCRIPTS -->
        <script type="module" src="scripts/auth.js"></script>
        <script type="module" src="scripts/navlogic.js"></script>
    </body>
</html>
