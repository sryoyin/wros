<!DOCTYPE html>
<html lang="es">
    <head>
        <link rel="stylesheet" href="style.css">
        <link rel="icon" href="img/student.png">
        <meta charset="UTF-8">
        <title>White Room - Login</title>
    </head>
    <body>
        <!-- BARRA DE NAVEGACIÓN -->
        <nav>
            <section>
                <button onclick="location.href='profile'" style="padding: 15px 20px;"><img id="accimg" src="img/student.png" width="50px"></button>
                <span>WHITE ROOM</span>
            </section>
            <section style="gap: 0;">
                <button onclick="location.href='main'"><img src="img/student.png" width="40px">Main</button>
                <button onclick="location.href='schedule'"><img src="img/student.png" width="40px">Schedule</button>
                <button onclick="location.href='oaa'"><img src="img/student.png" width="40px">OAA</button>
            </section>
        </nav>
        <!-- PÁGINA -->
        <form id="login-form">
            <h1>Login</h1>
            <section>
                <label for="login-user">User:</label>
                <input type="text" id="login-user" required>
            </section>
            <section>
                <label for="login-pass">Password:</label>
                <input type="password" id="login-pass" required>
            </section>
            <section>
                <button type="submit">Login</button>
                <button id="google-btn" style="padding: 12.2px;">
                    <svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" xmlns:xlink="http://www.w3.org/1999/xlink" width="22px">
                        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path>
                        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path>
                        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path>
                        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path>
                        <path fill="none" d="M0 0h48v48H0z"></path>
                    </svg>
                    Sign in with Google
                </button>
            </section>
            <button onclick="location.href='register';">Dont have an account? Start today</button>
        </form>
        <!-- SCRIPTS -->
        <script type="module" src="scripts/auth.js"></script>
        <script type="module" src="scripts/mainlogic.js"></script>
    </body>
</html>
